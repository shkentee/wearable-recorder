name: bsim-nightly

# Triggers the existing bsim.yml workflow on a nightly schedule without
# touching bsim.yml itself (it stays manual-trigger-only). 03:17 JST is
# 18:17 UTC. workflow_dispatch is also wired up for ad-hoc smoke checks.

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'bsim.yml',
              ref: 'main',
            });
