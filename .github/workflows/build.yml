name: firmware-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: nordicplayground/nrfconnect-sdk:v2.9-branch
    defaults:
      run:
        shell: bash
    steps:
      - name: Install git in container (required for actions/checkout submodule support)
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends git ca-certificates
          git --version

      - name: Checkout app (without submodules)
        uses: actions/checkout@v4
        with:
          submodules: false
          path: app

      - name: Init omi submodule manually (no recursion)
        working-directory: app
        run: |
          # actions/checkout's 'submodules: true' still recurses into omi's
          # internal submodules and trips on a broken reference under
          # omiGlass/firmware/.pio/libdeps that's missing from .gitmodules.
          # Devkit firmware doesn't need nested submodules — Opus is vendored
          # at src/lib/opus-1.2.1/ — so we init only the top level.
          git config --global --add safe.directory '*'
          git submodule update --init --depth=1 third_party/omi
          ls third_party/omi/omi/firmware/devkit/ | head -5

      - name: Build firmware (omi devkit, DK1+SPISD)
        env:
          WORKDIR: /workdir
        run: |
          set -e

          echo "::group::container entry.sh"
          [ -f /root/entry.sh ] && cat /root/entry.sh || echo "(no /root/entry.sh)"
          echo "::endgroup::"

          # NordicPlayground container pre-installs NCS at /workdir/ but does
          # NOT export env vars when the runner overrides the entrypoint.
          # Source the standard Zephyr env script to get ZEPHYR_BASE/PATH.
          if [ -f "$WORKDIR/zephyr/zephyr-env.sh" ]; then
            source "$WORKDIR/zephyr/zephyr-env.sh"
          fi

          # west may be installed in a venv that the entry script activates.
          # Common locations:
          for venv in /workdir/.venv /opt/venv /root/.venv; do
            if [ -f "$venv/bin/activate" ]; then
              source "$venv/bin/activate"
              echo "activated venv: $venv"
              break
            fi
          done

          # Fallback: install west via pip if still missing.
          if ! command -v west >/dev/null 2>&1; then
            echo "west not found, installing via pip"
            pip3 install --quiet --break-system-packages west || pip3 install --quiet west
          fi

          # Locate Zephyr SDK toolchain (containers ship it under /root/ncs/toolchains).
          if [ -z "$ZEPHYR_SDK_INSTALL_DIR" ]; then
            SDK_CANDIDATE=$(find /root/ncs/toolchains /opt -maxdepth 5 -type d -name "zephyr-sdk-*" 2>/dev/null | head -1)
            if [ -n "$SDK_CANDIDATE" ]; then
              export ZEPHYR_SDK_INSTALL_DIR="$SDK_CANDIDATE"
            fi
          fi
          export ZEPHYR_TOOLCHAIN_VARIANT="${ZEPHYR_TOOLCHAIN_VARIANT:-zephyr}"

          # Make sure the SDK's gcc is on PATH for fallback diagnostics.
          if [ -n "$ZEPHYR_SDK_INSTALL_DIR" ]; then
            export PATH="$ZEPHYR_SDK_INSTALL_DIR/arm-zephyr-eabi/bin:$PATH"
          fi

          echo "::group::resolved env"
          echo "ZEPHYR_BASE=$ZEPHYR_BASE"
          echo "ZEPHYR_TOOLCHAIN_VARIANT=$ZEPHYR_TOOLCHAIN_VARIANT"
          echo "ZEPHYR_SDK_INSTALL_DIR=$ZEPHYR_SDK_INSTALL_DIR"
          which west cmake ninja arm-zephyr-eabi-gcc 2>&1 || true
          west --version 2>&1 || true
          arm-zephyr-eabi-gcc --version 2>&1 | head -1 || true
          echo "::endgroup::"

          if [ -z "$ZEPHYR_BASE" ]; then
            echo "::error::ZEPHYR_BASE still empty after env setup" >&2
            exit 1
          fi

          # Build from the pre-fetched workspace so west finds the manifest.
          WORKSPACE_ROOT="$(dirname "$ZEPHYR_BASE")"
          echo "Using workspace at $WORKSPACE_ROOT"
          cd "$WORKSPACE_ROOT"
          west build \
            -b xiao_ble/nrf52840/sense \
            -p always \
            "$GITHUB_WORKSPACE/app/third_party/omi/omi/firmware/devkit" \
            -- -DCONF_FILE=prj_xiao_ble_sense_devkitv1-spisd.conf
          ls -la build/zephyr/ | head -20
          echo "BUILD_DIR=$WORKSPACE_ROOT/build" >> "$GITHUB_ENV"

      - name: Convert hex to UF2 (XIAO BLE bootloader, family 0xADA52840)
        run: |
          set -e
          curl -sSL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py -o /tmp/uf2conv.py
          curl -sSL https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json -o /tmp/uf2families.json
          python3 /tmp/uf2conv.py "$BUILD_DIR/zephyr/zephyr.hex" -c -f 0xADA52840 -o "$BUILD_DIR/firmware.uf2"
          ls -la "$BUILD_DIR/firmware.uf2" "$BUILD_DIR/zephyr/zephyr.hex" "$BUILD_DIR/zephyr/zephyr.elf"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-xiao-ble-${{ github.sha }}
          path: |
            ${{ env.BUILD_DIR }}/zephyr/zephyr.hex
            ${{ env.BUILD_DIR }}/zephyr/zephyr.elf
            ${{ env.BUILD_DIR }}/zephyr/zephyr.map
            ${{ env.BUILD_DIR }}/firmware.uf2
          if-no-files-found: error
          retention-days: 30
