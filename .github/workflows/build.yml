name: firmware-build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # omi was developed against NCS v2.7. v2.9 makes CONFIG_NRFX_PDM
      # non-user-settable (driven by device tree), which trips omi's
      # prj_xiao_ble_sense_devkitv1-spisd.conf. Stay on v2.7-branch until we
      # decide whether to upstream-patch omi or fork.
      image: nordicplayground/nrfconnect-sdk:v2.7-branch
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build tools in container
        run: |
          # The nordicplayground/nrfconnect-sdk:v2.9-branch image ships the
          # NCS source tree at /workdir/ but does NOT include a usable PATH
          # entry for west/cmake/ninja/pip — its entry.sh is literally just
          # 'exec $@'. Pull in the pieces we need via apt.
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            git ca-certificates \
            python3-pip python3-setuptools python3-wheel \
            cmake ninja-build gperf ccache \
            device-tree-compiler dfu-util wget xz-utils file \
            libsdl2-dev libmagic1
          git --version
          cmake --version | head -1
          ninja --version
          python3 --version
          python3 -m pip --version

      - name: Checkout repo (without submodules)
        uses: actions/checkout@v4
        with:
          submodules: false
          # No 'path:' — land at $GITHUB_WORKSPACE so refs match the
          # repo layout (avoids 'app/app/overlay/...' confusion since the
          # repo already has its own app/ subdirectory).

      - name: Init omi submodule manually (no recursion)
        run: |
          # actions/checkout's 'submodules: true' still recurses into omi's
          # internal submodules and trips on a broken reference under
          # omiGlass/firmware/.pio/libdeps that's missing from .gitmodules.
          # Devkit firmware doesn't need nested submodules — Opus is vendored
          # at src/lib/opus-1.2.1/ — so we init only the top level.
          git config --global --add safe.directory '*'
          git submodule update --init --depth=1 third_party/omi
          ls third_party/omi/omi/firmware/devkit/ | head -5

      - name: Patch omi prj.conf typo (CONFIG_OMI_OFFLINE_STORAGE → OMI_ENABLE_OFFLINE_STORAGE)
        run: |
          # omi's Kconfig defines `OMI_ENABLE_OFFLINE_STORAGE` but the
          # devkit prj.conf still references the older name
          # `CONFIG_OMI_OFFLINE_STORAGE`. Kconfig aborts on the undefined
          # symbol. Fix in place — submodule isn't committed so this is safe.
          CONF=third_party/omi/omi/firmware/devkit/prj_xiao_ble_sense_devkitv1-spisd.conf
          if grep -qE '^CONFIG_OMI_OFFLINE_STORAGE=' "$CONF"; then
            sed -i 's/^CONFIG_OMI_OFFLINE_STORAGE=/CONFIG_OMI_ENABLE_OFFLINE_STORAGE=/' "$CONF"
            echo "Patched $CONF:"
            grep -E '^CONFIG_OMI_(ENABLE_)?OFFLINE_STORAGE=' "$CONF"
          else
            echo "$CONF already uses CONFIG_OMI_ENABLE_OFFLINE_STORAGE (or symbol absent), no patch needed"
          fi

      - name: Install west and locate Zephyr toolchain
        run: |
          set -e
          # west + Zephyr build script deps (pyelftools, etc.) via pip user-install.
          # The older pip in this image rejects --break-system-packages, so use --user.
          python3 -m pip install --quiet --user west
          PIP_BIN="$(python3 -c 'import site; print(site.USER_BASE)')/bin"
          echo "$PIP_BIN" >> "$GITHUB_PATH"
          export PATH="$PIP_BIN:$PATH"
          west --version

          # Zephyr's build-time scripts (gen_kobject_list.py, etc.) need
          # pyelftools, pykwalify, packaging, etc. Install from Zephyr's
          # bundled requirements file rather than guessing.
          if [ -f /workdir/zephyr/scripts/requirements-base.txt ]; then
            python3 -m pip install --quiet --user -r /workdir/zephyr/scripts/requirements-base.txt
          else
            python3 -m pip install --quiet --user pyelftools pykwalify packaging anytree intelhex
          fi

          # Nordic Toolchain Manager installs the Zephyr SDK under a UUID
          # directory like /root/ncs/toolchains/<uuid>/, NOT zephyr-sdk-X.Y.Z.
          # Find arm-zephyr-eabi-gcc directly and derive paths from it.
          GCC=$(find /root/ncs/toolchains /opt /workdir /usr/local -maxdepth 8 -type f -name "arm-zephyr-eabi-gcc" 2>/dev/null | head -1)
          if [ -z "$GCC" ]; then
            # Fall back to nordic's bundled gcc (arm-none-eabi-gcc)
            GCC=$(find /root/ncs/toolchains /opt -maxdepth 8 -type f -name "arm-none-eabi-gcc" 2>/dev/null | head -1)
          fi
          if [ -z "$GCC" ]; then
            echo "::group::could not find ARM gcc, dumping toolchain dirs"
            for d in /root/ncs/toolchains /opt /usr/local; do
              echo "--- find under $d ---"
              find "$d" -maxdepth 8 -type d 2>/dev/null | head -40 || true
            done
            echo "::endgroup::"
            echo "::error::No arm-*-eabi-gcc binary found in container"
            exit 1
          fi
          GCC_BIN_DIR=$(dirname "$GCC")
          echo "Found gcc at: $GCC"
          "$GCC" --version | head -1

          # Reconstruct ZEPHYR_SDK_INSTALL_DIR if this is a real Zephyr SDK
          if [[ "$GCC" == *"arm-zephyr-eabi-gcc" ]]; then
            # Walk up from .../arm-zephyr-eabi/bin/arm-zephyr-eabi-gcc to SDK root
            SDK_ROOT="$(dirname "$(dirname "$GCC_BIN_DIR")")"
            echo "ZEPHYR_SDK_INSTALL_DIR=$SDK_ROOT" >> "$GITHUB_ENV"
            echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> "$GITHUB_ENV"
          else
            # Generic GNU ARM (arm-none-eabi)
            GNUARMEMB_ROOT="$(dirname "$GCC_BIN_DIR")"
            echo "GNUARMEMB_TOOLCHAIN_PATH=$GNUARMEMB_ROOT" >> "$GITHUB_ENV"
            echo "ZEPHYR_TOOLCHAIN_VARIANT=gnuarmemb" >> "$GITHUB_ENV"
          fi
          echo "ZEPHYR_BASE=/workdir/zephyr" >> "$GITHUB_ENV"
          echo "$GCC_BIN_DIR" >> "$GITHUB_PATH"

      - name: Build firmware (omi devkit, DK1+SPISD)
        run: |
          set -e
          echo "::group::resolved env"
          echo "ZEPHYR_BASE=$ZEPHYR_BASE"
          echo "ZEPHYR_TOOLCHAIN_VARIANT=$ZEPHYR_TOOLCHAIN_VARIANT"
          echo "ZEPHYR_SDK_INSTALL_DIR=$ZEPHYR_SDK_INSTALL_DIR"
          which west cmake ninja arm-zephyr-eabi-gcc 2>&1 || true
          west --version 2>&1 || true
          arm-zephyr-eabi-gcc --version 2>&1 | head -1 || true
          echo "::endgroup::"

          # Build from /workdir (the pre-fetched NCS workspace) so west picks
          # up the existing manifest. The devkit lives in our checked-out repo.
          # OVERLAY_CONFIG layers app/overlay/spisd-fixup.conf to plug holes
          # in omi's DK1+SPISD prj.conf (PM_DEVICE / WATCHDOG).
          cd /workdir
          west build \
            -b xiao_ble/nrf52840/sense \
            -p always \
            "$GITHUB_WORKSPACE/third_party/omi/omi/firmware/devkit" \
            -- \
              -DCONF_FILE=prj_xiao_ble_sense_devkitv1-spisd.conf \
              -DOVERLAY_CONFIG="$GITHUB_WORKSPACE/app/overlay/spisd-fixup.conf"
          ls -la build/zephyr/ | head -20
          echo "BUILD_DIR=/workdir/build" >> "$GITHUB_ENV"

      - name: Convert hex to UF2 (XIAO BLE bootloader, family 0xADA52840)
        run: |
          set -e
          # The container has wget (we installed it) but not curl.
          wget -qO /tmp/uf2conv.py https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2conv.py
          wget -qO /tmp/uf2families.json https://raw.githubusercontent.com/microsoft/uf2/master/utils/uf2families.json
          python3 /tmp/uf2conv.py "$BUILD_DIR/zephyr/zephyr.hex" -c -f 0xADA52840 -o "$BUILD_DIR/firmware.uf2"
          ls -la "$BUILD_DIR/firmware.uf2" "$BUILD_DIR/zephyr/zephyr.hex" "$BUILD_DIR/zephyr/zephyr.elf"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-xiao-ble-${{ github.sha }}
          path: |
            ${{ env.BUILD_DIR }}/zephyr/zephyr.hex
            ${{ env.BUILD_DIR }}/zephyr/zephyr.elf
            ${{ env.BUILD_DIR }}/zephyr/zephyr.map
            ${{ env.BUILD_DIR }}/firmware.uf2
          if-no-files-found: error
          retention-days: 30

      - name: Twister tests on native_sim (Phase 3 sanity)
        run: |
          set -e
          cd /workdir
          west twister \
            --testsuite-root "$GITHUB_WORKSPACE/tests/firmware" \
            --platform native_sim \
            --inline-logs \
            --integration \
            --no-clean
          # Surface JUnit results
          ls -la twister-out/twister.xml 2>&1 || true

      - name: Upload twister results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: twister-results-${{ github.sha }}
          path: /workdir/twister-out/
          if-no-files-found: warn
          retention-days: 30
