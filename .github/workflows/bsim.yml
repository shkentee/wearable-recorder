name: bsim-smoke

# Manual-trigger only. See docs/bsim-setup.md for rationale (5+ min build time).
# Once stable, consider adding `pull_request` for changes under tests/bsim/**.
on:
  workflow_dispatch:

jobs:
  bsim-smoke:
    runs-on: ubuntu-latest
    container:
      image: nordicplayground/nrfconnect-sdk:v2.7-branch
    defaults:
      run:
        shell: bash
    env:
      # bsim_west's manifest pins self.path: bsim and project paths
      # under bsim/components/, so the workspace topdir nests one
      # level: BSIM_OUT_PATH lives at <topdir>/bsim/.
      BSIM_TOPDIR: /opt/bsim_ws
      BSIM_OUT_PATH: /opt/bsim_ws/bsim
      BSIM_COMPONENTS_PATH: /opt/bsim_ws/bsim/components
      ZEPHYR_BASE: /workdir/zephyr
    steps:
      - name: Install bsim build deps
        run: |
          apt-get update -qq
          # gcc-multilib pulls 32-bit headers required by the bsim
          # device binaries (see https://babblesim.github.io/fetching.html).
          apt-get install -y -qq --no-install-recommends \
            git ca-certificates make gcc g++ gcc-multilib pkg-config \
            cmake ninja-build gperf ccache device-tree-compiler \
            libsdl2-dev libfftw3-dev libffi-dev libmagic1 \
            python3 python3-pip python3-setuptools python3-wheel

      - name: Install west (needed for bsim manifest)
        run: |
          python3 -m pip install --quiet --user west
          PIP_BIN="$(python3 -c 'import site; print(site.USER_BASE)')/bin"
          echo "$PIP_BIN" >> "$GITHUB_PATH"
          export PATH="$PIP_BIN:$PATH"
          west --version

      - name: Build BabbleSim
        run: |
          set -e
          mkdir -p "$BSIM_TOPDIR"
          cd "$BSIM_TOPDIR"
          git config --global --add safe.directory '*'
          export PATH="$(python3 -c 'import site; print(site.USER_BASE)')/bin:$PATH"
          # bsim_west is the canonical west manifest repo for BabbleSim
          # (https://github.com/BabbleSim/bsim_west). Its west.yml pins
          # self.path: bsim, so BSIM_OUT_PATH = $BSIM_TOPDIR/bsim/.
          # ZEPHYR_BASE is set globally for this job (Zephyr workspace
          # at /workdir), but west init/update must not see it or it'll
          # refuse with "already initialized in /workdir".
          env -u ZEPHYR_BASE west init -m https://github.com/BabbleSim/bsim_west.git .
          env -u ZEPHYR_BASE west update
          test -f "$BSIM_OUT_PATH/components/common/Makefile" \
            || { echo "::error::driver Makefile missing — manifest layout changed?"; exit 1; }
          cd "$BSIM_OUT_PATH"
          make -f components/common/Makefile everything -j"$(nproc)"
          ls -1 bin/ | head -10
          echo "bsim built; phy binary:"
          ls -la bin/bs_2G4_phy_v1

      - name: Locate Zephyr toolchain (Nordic Toolchain Manager layout)
        run: |
          GCC=$(find /root/ncs/toolchains /opt /workdir /usr/local -maxdepth 8 -type f -name "arm-zephyr-eabi-gcc" 2>/dev/null | head -1)
          if [ -z "$GCC" ]; then
            echo "::error::No arm-zephyr-eabi-gcc found"
            exit 1
          fi
          GCC_BIN_DIR=$(dirname "$GCC")
          SDK_ROOT="$(dirname "$(dirname "$GCC_BIN_DIR")")"
          echo "ZEPHYR_SDK_INSTALL_DIR=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ZEPHYR_TOOLCHAIN_VARIANT=zephyr" >> "$GITHUB_ENV"
          echo "$GCC_BIN_DIR" >> "$GITHUB_PATH"

      - name: Install Zephyr Python deps
        run: |
          if [ -f /workdir/zephyr/scripts/requirements.txt ]; then
            python3 -m pip install --quiet --user -r /workdir/zephyr/scripts/requirements.txt
          fi

      - name: Smoke test — bsim binaries respond to --help
        run: |
          set -e
          # We deliberately do NOT compile a Zephyr-bundled bsim test
          # here. NCS layers nrfxlib's SoftDevice Controller on top of
          # Zephyr, which CMake-rejects nrf52_bsim's float ABI combo
          # ("not supported by the SoftDevice Controller lib"). Picking
          # the right controller for bsim under NCS is non-trivial
          # plumbing (override CONFIG_BT_LL_SW_SPLIT, suppress nrfxlib
          # softdevice_controller for this target, etc.) and belongs in
          # Phase 6 when we write our first real omi BLE bsim test.
          #
          # For now just prove the install is sane: each shipped bsim
          # binary exists and accepts -help (returns 0 or prints usage).
          set +e
          for bin in bs_2G4_phy_v1 bs_device_handbrake bs_device_pause_simu \
                     bs_device_time_monitor; do
            BIN_PATH="$BSIM_OUT_PATH/bin/$bin"
            if [ ! -x "$BIN_PATH" ]; then
              echo "::error::missing bsim binary: $BIN_PATH"
              exit 1
            fi
            "$BIN_PATH" -help >/dev/null 2>&1
            rc=$?
            # bsim binaries return 0 on -help or exit non-zero with usage
            # text. Treat anything other than segfault (>=128) as success.
            if [ "$rc" -ge 128 ]; then
              echo "::error::$bin crashed on -help (rc=$rc)"
              exit 1
            fi
            echo "$bin: ok (rc=$rc)"
          done
          echo "smoke test PASSED — bsim install is functional"
          echo "Phase 6 TODO: add Zephyr/NCS bsim test under tests/bsim/wr_*/"
          echo "and switch this step to compile + run that test end-to-end."
