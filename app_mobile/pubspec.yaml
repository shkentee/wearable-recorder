name: wearable_recorder
description: Minimal Flutter client for the wearable-recorder firmware (Phase 6 MVP).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # BLE — chosen per docs/phase6-plan-draft.md §2.1.
  # flutter_blue_plus is the maintained successor of flutter_blue with
  # solid Android 13 / iOS 17 support and no native build steps beyond
  # platform permissions in AndroidManifest.xml / Info.plist.
  # Bumped from ^1.32.12 to ^2.2.1: the 1.x line ships flutter_blue_plus_android
  # 7.0.4 whose android/build.gradle uses the legacy `flutter` extension that
  # is no longer provided by Flutter 3.24's scaffolding (`flutter create`).
  # 2.x has no API breakage vs 1.x (changelog: "switch to FlutterBluePlus license").
  flutter_blue_plus: ^2.2.1

  # Permissions for Android 12+ scan / connect prompts.
  permission_handler: ^11.3.1

  # App-documents directory for dumping audioCodec packets to disk;
  # PC-side tooling re-parses the headers offline.
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
