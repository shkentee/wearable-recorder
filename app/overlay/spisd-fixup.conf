# Configs missing from omi/firmware/devkit/prj_xiao_ble_sense_devkitv1-spisd.conf
# but referenced unconditionally by main.c and wdog_facade.c.
#
# omi's DK1+SPISD prj.conf has been left behind compared to the DK2 conf —
# main.c calls pm_device_action_run() and wdog_facade.c uses the watchdog
# device, both of which resolve to undefined symbols at link time without
# these options.
#
# Layered via west build -DOVERLAY_CONFIG=... so we don't have to fork the
# omi prj.conf in-place.

# main.c: pm_device_action_run for nRF clock/power management.
CONFIG_PM_DEVICE=y

# wdog_facade.c: kernel watchdog device + leave it running across boot.
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=n

# main.c references DT_NODELABEL(p25q16h) — the XIAO Sense onboard 2MB QSPI
# flash. omi's DK2 conf enables CONFIG_FLASH=y for this; DK1+SPISD doesn't.
# Without the flash subsystem, the device ordinal links to nothing.
CONFIG_FLASH=y
CONFIG_SPI_NOR=y

# Phase 4-4: USB Mass Storage support compiled in. Runtime activation is
# gated by the wr_msc_mode flag (read at boot) — see app/src/wr_msc_mode.c.
# Until the runtime gate lands, we just confirm the MSC stack fits in
# memory budget (FLASH and RAM headroom).
CONFIG_USB_DEVICE_STACK=y
# 2026-05-01 #3: disable USB MSC entirely. The "Storage init ERROR"
# from usb_msc at SYS_INIT time may be poisoning the USB stack —
# CDC ACM stops accepting bytes ~1 s into boot, after main has
# only logged WR_TRACE 1b_model. Removing the MSC class entirely
# should let CDC stand on its own and surface the real main flow.
CONFIG_USB_MASS_STORAGE=n
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
# 2026-05-01 #4: bump CDC ACM TX ringbuf so the early-boot log burst
# (boot banner + ~9 SYS_INIT logs + 8 main printks ≈ 900 bytes)
# doesn't fill the ring before the host has connected. Default in
# NCS v2.7 is 1024 — bump 8x to be safe.
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=8192
CONFIG_USB_DEVICE_PRODUCT="wearable-recorder"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0008

# Bring-up debug 2026-04-30: when BLE CONNECT happens, the BT host stack
# generates a burst of debug-level logs that overruns the deferred log
# buffer. The log thread then blocks on CDC ACM backpressure, which in
# turn blocks every other thread that calls LOG_INF — including main's
# heartbeat path that feeds the watchdog. Result: 30 s WDT reset on
# every CONNECT attempt. Enlarge the log ring and explicitly opt into
# overflow-drop so the log thread never blocks.
# Reverted to OVERFLOW (drop newest) + 32k buffer.
# IMMEDIATE caused boot-time CDC deadlock — log writes blocked before
# USB enumeration completed and the boot path never finished.
# omi DK1+SPISD prj.conf line 68 sets CONFIG_LOG_MODE_IMMEDIATE=y, which
# we need to override. In immediate mode every LOG_INF call blocks
# until all backends accept the line — CDC ACM backpressure during USB
# enumeration deadlocks the calling thread, so main only ever logs
# `Booting...` and `Model: ...` before hanging mid-Firmware-revision
# log (the prefix `<inf> main:` lands but the body never does, and 25 s
# later usb_msc warnings get concatenated onto the same line).
# Explicitly disable IMMEDIATE and select DEFERRED so the log thread
# does the I/O on a separate thread, with our ring buffer + drop-newest
# overflow policy keeping main unblocked.
CONFIG_LOG_MODE_IMMEDIATE=n
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=32768
CONFIG_LOG_MODE_OVERFLOW=y

# wr_boot_cmd.c: sys_reboot() requires CONFIG_REBOOT.
CONFIG_REBOOT=y

# Bring-up debug 2026-04-30: extend the watchdog timeout from 30 s to
# 10 min so BLE connection debugging is not interrupted by the WDT firing
# 30 s after every CONNECT (root cause of that lockup TBD). Restore to
# the omi default before the production firmware ship.
# (The actual define lives in omi/firmware/devkit/src/wdog_facade.c as a
# hardcoded macro, so the timeout bump is delivered via patch 0013.)

# ---------------------------------------------------------------
# v18 (2026-05-01): drop ALL BT debug log knobs.
#
# History: v15 (full BT debug + LOG_BUFFER_SIZE=32k) → boot+CDC died
# from RAM pressure. v16/v17a kept 3 BT_*_LOG_LEVEL_DBG domains —
# board booted but USB CDC went silent within ~30 s after boot, well
# before any BLE connect attempt. The proximate cause appears to be
# advertise-triggered log bursts (`bt_hci_core` emits multiple lines
# per advertising channel hop at 100 ms) that overrun the deferred
# log ring → log thread blocks on CDC ACM backpressure → other threads
# touching LOG_INF stall → USB device stack stops servicing descriptor
# requests → Windows surfaces "unknown USB device, descriptor request
# failed".
#
# So v18 disables BT debug logging entirely. We give up on capturing
# `LE Connection Complete reason=...` from the firmware side. Instead
# we'll observe the disconnect via Android-side dumpsys / nRF Connect
# UI — that gives us status=Success vs. status=0x3E directly, which
# is enough to tell whether v17a's backport (CTLR_SDC_MAX_CONN_EVENT_
# LEN_DEFAULT=400000) actually closes the 333 ms drop.
#
# If v18 boots stably AND the drop disappears: hypothesis B confirmed,
# we can re-add a minimal log surface later for production observability.
# If v18 boots stably but the drop still happens: we know the SDC knob
# isn't the cause and can move to v18b (CTLR_PHY_2M, PERIPHERAL_PREF_*).
# If v18 still kills CDC: the failure is somewhere outside the BT log
# overlay and a deeper RAM/thread audit is needed.
# ---------------------------------------------------------------
# (no BT_*_LOG_LEVEL_DBG lines — defaults to LOG_LEVEL_INF/WRN)

# ---------------------------------------------------------------
# v20 (2026-05-01): omi.conf production-set bulk backport.
#
# Single-knob trials A/B/C/F all failed (all timed out 5/5 in PC
# bleak). The peripheral isn't bridging establishment under any
# isolated tweak, so we stop second-guessing and import the BLE
# settings that production omi (omi.conf, nRF5340 build) is known
# to ship with — the assumption being that the omi maintainers
# already tuned a working set and DK1+SPISD just never inherited it.
#
# If v20 establishes cleanly, we'll bisect later to find the load-
# bearing knob. If it still fails, the problem is hardware-layer
# (RF / decoupling / antenna) and needs a sniffer.
#
# Sources: third_party/omi/omi/firmware/omi/omi.conf lines 150-181
# (matched to DK1's gaps in prj_xiao_ble_sense_devkitv1-spisd.conf).
# We deliberately do NOT add SDC_MAX_CONN_EVENT_LEN_DEFAULT — v18
# proved it destabilises the SDC scheduler on this build.
# ---------------------------------------------------------------

# CTLR PHY support — let the controller offer 2 M / Coded PHY
# options on top of the default 1 M.
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_CTLR_PHY_CODED=y

# Peripheral preferred connection params advertised to the central.
# Values match omi.conf: 7.5 ms / 15 ms CI, latency 0, 6 s timeout.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# GATT / ATT plumbing
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y
CONFIG_BT_ATT_TX_COUNT=20
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# Power: BOARD_ENABLE_DCDC_APP is nRF5340-only (omi production board).
# On nRF52840 the DCDC is enabled via board DTS, not Kconfig — drop
# this line to unblock the build.
# CONFIG_BOARD_ENABLE_DCDC_APP=y

# ---------------------------------------------------------------
# v21 (2026-05-01): hypothesis E — kill all PHY/DLE auto-update.
#
# All single-knob trials (A/B/C/F) and the omi.conf bulk backport
# (v20a) failed with PC bleak 5/5 timeout. The remaining knob in
# the establishment-phase candidate set is PHY/DLE auto-update:
#
# DK1+SPISD prj.conf:
#   CONFIG_BT_USER_PHY_UPDATE=y
#   CONFIG_BT_USER_DATA_LEN_UPDATE=y
#   CONFIG_BT_AUTO_PHY_UPDATE=y
#   CONFIG_BT_AUTO_DATA_LEN_UPDATE=y
#
# AUTO_PHY_UPDATE=y means the controller fires a PHY update right
# after the connection comes up, while USER_PHY_UPDATE=y reserves
# the API for the app — but the devkit transport.c never calls
# bt_conn_le_phy_update(). Plausibly the controller initiates the
# auto-update before the host even sees the link, the central
# rejects or fails to ack, and the link gets torn down inside the
# 6-event window we keep hitting.
#
# Force everything off — no auto, no user. Stay on 1 M PHY, default
# DLE only. This is incompatible with omi production behaviour
# (which expects 2 M throughput) but it's the cleanest test of
# whether PHY/DLE negotiation is the root cause.
#
# If v21 still hits 5/5 timeout, the firmware-layer search is
# exhausted and the issue is hardware (RF / supply / antenna).
# ---------------------------------------------------------------
# v21 attempt set USER_*_UPDATE=n too — that broke the build because
# omi/devkit/src/transport.c references bt_conn_le_info.phy and .data_len,
# which are gated by CONFIG_BT_USER_PHY_UPDATE / USER_DATA_LEN_UPDATE.
# Keep USER_* on so the struct fields exist; only kill AUTO_* so the
# controller stops initiating PHY/DLE update on its own.
# CONFIG_BT_USER_PHY_UPDATE=y       (kept = devkit prj.conf default)
# CONFIG_BT_USER_DATA_LEN_UPDATE=y  (kept = devkit prj.conf default)
CONFIG_BT_AUTO_PHY_UPDATE=n
CONFIG_BT_AUTO_DATA_LEN_UPDATE=n

# ---------------------------------------------------------------
# 2026-05-01: SD mount keeps failing with usb_msc Storage init ERROR.
# Pin assignment + SPI clock are already corrected (patch 0017/0018)
# and continuity is confirmed end-to-end. Turn on debug logs for the
# storage stack ONLY so the ACTUAL failure reason shows up.
#
# First attempt set CONFIG_LOG_DEFAULT_LEVEL=4 globally — that flooded
# CDC ACM and killed USB enumeration before we could see anything.
# Keep default at INFO and raise only the storage modules.
# ---------------------------------------------------------------
# 2026-05-01 #2: SD card itself confirmed readable on PC (FAT32 SDXC 128GB).
# So the bug is firmware-side: disk_access_init("SD") returns ENODEV at
# boot (visible as 'usb_msc: Storage init ERROR' from the USB MSC subsys
# init that runs at SYS_INIT level). Diagnosis:
#
# omi DK1+SPISD prj.conf has CONFIG_DISK_DRIVER_SDMMC=y but does NOT set
# CONFIG_SDHC=y. The DTS overlay declares zephyr,sdhc-spi-slot — that
# requires the SDHC subsystem to be enabled to instantiate a host
# controller on the SPI bus. Without it, the sdmmc-disk child node has
# no parent host to attach to, so the disk slot 'SD' is never registered.
#
# In NCS v2.7 / Zephyr 3.6 the SPI backend of the SDHC subsystem does
# NOT have a user-facing kconfig (CONFIG_SDHC_SPI doesn't exist) — it
# auto-selects from the DT presence of zephyr,sdhc-spi-slot. So just
# enabling CONFIG_SDHC is enough; the driver in drivers/sdhc/sdhc_spi.c
# will bind to the DT node and the existing CONFIG_DISK_DRIVER_SDMMC=y
# from omi's prj.conf will register the disk slot 'SD'.
# 2026-05-01 #5: tried legacy zephyr,mmc-spi-slot pattern. Failed
# identically (disk_access_init -22). Reverted; NCS v2.7 dropped the
# legacy mmc-spi-slot binding entirely.
# 2026-05-01 #6: add SD_STACK + DISK_DRIVERS explicitly. Without
# CONFIG_SD_STACK=y the sdmmc_subsys.c driver doesn't compile in,
# which explains why disk_access_init('SD') returns -EINVAL.
CONFIG_SDHC=y
# Note: SD_STACK and DISK_DRIVERS are auto-selected when CONFIG_SDHC=y
# and CONFIG_DISK_DRIVER_SDMMC=y are set. Setting them explicitly
# fails with 'not user-modifiable' in NCS v2.7.
#
# 2026-05-01 #7: KEY INSIGHT — `disk-name` property in DTS is IGNORED
# by sdmmc_subsys.c in Zephyr 3.6. The actual disk name comes from
# CONFIG_SDMMC_VOLUME_NAME. Default is "SD" but pin it explicitly so
# omi's `disk_access_init("SD")` definitely matches.
CONFIG_SDMMC_VOLUME_NAME="SD"
CONFIG_DISK_ACCESS=y
# 2026-05-01 #8: Explicit SPI_SDHC enable. CI build evidence shows
# only disk_access.c compiles (subsys/disk/) — no sdhc_spi.c, no
# sdmmc_subsys.c, no sd.c. CONFIG_SDHC=y alone doesn't pull in the
# SPI backend driver. The kconfig name in NCS 2.7 is SPI_SDHC, not
# SDHC_SPI (we tried that and it errored as undefined).
CONFIG_SPI_SDHC=y

# 2026-05-01 #9: with DTS overlay finally applied, patch 0015 disables
# &adc which battery.c references → '__device_dts_ord_XX undeclared'.
# Disable battery feature entirely; we don't need it for SD-only mode.
CONFIG_OMI_ENABLE_BATTERY=n
# 2026-05-02: removed CONFIG_ADC=n. battery.c unconditionally references
# DT_NODELABEL(adc) → __device_dts_ord_XX undefined → link error.
# The earlier "ADC interferes with SPI" hypothesis was wrong; the
# real cause was hardware state during multi-iteration debugging.
# Working build d43121e had CONFIG_ADC=y (default) and SD worked fine.

# Now that SDHC is on, raise the log levels of the SD storage stack
# so we can see what disk_access_init is unhappy about.
# The actual module names in NCS v2.7 are:
#   - sd       (subsys/sd/sd.c — top level SD/SDIO/MMC subsys)
#   - sdmmc    (subsys/sd/sdmmc.c — SD/MMC card init)
#   - sdhc     (drivers/sdhc/sdhc.c — host controller dispatch)
#   - sdhc_spi (drivers/sdhc/sdhc_spi.c — SPI bus backend)
#   - disk     (subsys/disk/disk_access.c — disk subsystem)
#   - sdmmc_subsys (drivers/disk/sdmmc_subsys.c — disk wrapper around SD)
CONFIG_SDMMC_LOG_LEVEL_DBG=y
CONFIG_SDHC_LOG_LEVEL_DBG=y
CONFIG_DISK_LOG_LEVEL_DBG=y
CONFIG_SD_LOG_LEVEL_DBG=y
# Note: SDHC_SPI / DISK_DRIVER_SDMMC don't have separate log level
# kconfigs in NCS v2.7 — they fall under the parent SDHC / DISK ones
# already enabled above.
