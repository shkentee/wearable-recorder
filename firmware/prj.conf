# Wearable Recorder firmware — bring-up profile
#
# Goals at this stage:
#   1. Board boots
#   2. USB CDC ACM provides /dev/ttyACM0 console
#   3. Green LED blinks
#   4. printk / LOG_INF reaches host

# --- Logging --------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=8192
CONFIG_LOG_MODE_OVERFLOW=y

# --- USB CDC ACM (console) ------------------------------------------------
# Console routed to usb_cdc_acm_uart by xiao_ble_common.dtsi via
# zephyr,console = &usb_cdc_acm_uart.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="wearable-recorder"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0008
# Enlarge CDC TX ring so early-boot log burst doesn't fill it before host
# enumerates and reads. Default in NCS v2.7 is 1024.
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=8192
# Don't auto-init: we call usb_enable() from main after waiting for DTR
# so output isn't lost.
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# --- Reboot syscall -------------------------------------------------------
CONFIG_REBOOT=y

# --- GPIO -----------------------------------------------------------------
CONFIG_GPIO=y

# --- Power management (XIAO BLE Sense onboard QSPI flash uses pm_device) --
CONFIG_PM_DEVICE=y

# --- printk for early bring-up via printf ---------------------------------
CONFIG_PRINTK=y
