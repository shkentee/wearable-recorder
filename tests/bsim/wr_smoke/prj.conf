# Phase 5+ bsim smoke — minimal omi audio service advertise on nrf52_bsim.
#
# The point is to prove the bsim BLE build pipeline works under NCS.
# We pin the pure-Zephyr software-split LL controller so nrfxlib's
# SoftDevice Controller (which CMake-rejects the nrf52_bsim SoC + float
# ABI combo) is gated out. See docs/bsim-setup.md.

# --- LL controller selection -----------------------------------------
# Force pure-Zephyr split LL — this is what makes nrf52_bsim viable.
CONFIG_BT_LL_SW_SPLIT=y
CONFIG_BT_LL_SOFTDEVICE=n

# --- BLE host roles ---------------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_DEVICE_NAME="WrBsimSmoke"

# --- Bare-minimum runtime --------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=y
CONFIG_PRINTK=y
CONFIG_ASSERT=y

# --- Native sim / bsim plumbing --------------------------------------
# Empty — board defaults handle the bsim radio backend hookup.
