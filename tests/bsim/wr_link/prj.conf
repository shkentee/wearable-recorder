# Phase 5+ bsim wr_link — peripheral + central exercising the omi
# audio service over a simulated 2.4 GHz radio. Both roles share one
# binary; the test_id arg picks which role to run (see src/main.c).

# Pin pure-Zephyr LL controller (gates out nrfxlib SoftDevice — see
# tests/bsim/wr_smoke/prj.conf comments).
CONFIG_BT_LL_SW_SPLIT=y
CONFIG_BT_LL_SOFTDEVICE=n

# BLE host: we need both roles compiled in since one binary runs both
# sides depending on -testid.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_BROADCASTER=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_DEVICE_NAME="WrBsimLink"
CONFIG_BT_MAX_CONN=1

# GATT — peripheral exposes a tiny audio service with a notify char,
# central discovers + subscribes.
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_NOTIFY_MULTIPLE=n

# Storage filenames can be up to 64 chars (1-byte type + name in one ATT PDU).
# Default ATT MTU 23 allows only 20-byte notification payloads — too small for
# long filenames. The local ATT MTU is capped by both L2CAP TX MTU and ACL RX
# size, so keep the ACL buffers large enough for a 64-byte ATT MTU.
CONFIG_BT_L2CAP_TX_MTU=64
CONFIG_BT_BUF_ACL_RX_SIZE=68
CONFIG_BT_BUF_ACL_TX_SIZE=68

# wr_link sends an audio burst immediately followed by storage LIST/FETCH
# notifications. Match the production firmware's larger ATT/L2CAP pools so
# bsim does not starve storage responses while earlier notifications drain.
CONFIG_BT_ATT_TX_COUNT=20
CONFIG_BT_L2CAP_TX_BUF_COUNT=20

# bs_tests framework
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=y
CONFIG_PRINTK=y
CONFIG_ASSERT=y
